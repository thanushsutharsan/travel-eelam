    <!-- Bootstrap CSS -->

      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"

    />

      type="image/png"
      sizes="32x32"

    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"

    />
  </head>

  <body>
    <!-- Header -->
    <header>
      <!-- Bootstrap Navbar used for navbar-->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a
            class="navbar-brand"
            href="index.html"
            aria-label="Travel Eelam Home"
            ><img
              id="mainlogo"
              src="assets/images/travel-eelam-logo-jpg.jpg"
              alt="Picture of Tamil Eelam Karthiykai Flower"
          /></a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menuNavbar"
            aria-controls="menuNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="menuNavbar">
            <ul class="navbar-nav ms-auto" id="menu">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="gallery.html">Gallery</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="signup.html">Signup</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Main content-->
   <main>
    <section id="signup-form">
      <form action="https://formspree.io/f/mlgokezj" method="POST">
        <h2 class="text-color">Sign Up for Travel Eelam Newsletter!</h2>

        <label for="flname" class="text-color">Full Name:</label>
        <input
          type="text"
          id="flname"
          name="fullname"
          class="text-input"
          required
        />
        <br />
        <label for="email" class="text-color">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          class="text-input"
          required
        />
        <br />
        <label for="phone" class="text-color">Phone:</label>
        <input type="tel" id="phone" name="phone" class="text-input" required />
        <br />

        <div class="radio-btns">
          <div>
            <label for="pref-sms" class="text-color">SMS</label>
            <input
              type="radio"
              id="pref-sms"
              name="newsletter_preference"
              value="sms"
              required
              checked
            />
          </div>
          <div>
            <label for="pref-email" class="text-color">Email</label>
            <input
              type="radio"
              id="pref-email"
              name="newsletter_preference"
              value="email"
              required
            />
          </div>
          <div>
            <label for="pref-both" class="text-color">Both</label>
            <input
              type="radio"
              id="pref-both"
              name="newsletter_preference"
              value="both"
              required
            />
          </div>
        </div>
        <button type="submit" value="Submit" class="btn-signup">Sign Up</button>
      </form>
    </section>
    </main>

    <!-- Footer-->
    <footer class="bg-light text-center py-3">
      <p>&copy; 2026 Travel Eelam. All rights reserved.</p>
      <ul id="social-networks">
        <li>
          <a
            href="https://www.facebook.com/"
            target="_blank"
            rel="noopener"
            aria-label="Facebook (opens in a new tab)"
          >
            <i class="fa-brands fa-facebook-f" style="color: #7a1a1a"></i>
          </a>
        </li>

        <li>
          <a
            href="https://www.twitter.com/"
            target="_blank"
            rel="noopener"
            aria-label="Twitter (opens in a new tab)"
          >

        <li>
          <a
            href="https://www.instagram.com/"

          >
            <i class="fa-brands fa-instagram" style="color: #7a1a1a"></i>
          </a>
        </li>

        <li>
          <a
            href="https://www.youtube.com/"
            target="_blank"
            rel="noopener"
            aria-label="YouTube (opens in a new tab)"
          >
            <i class="fa-brands fa-youtube" style="color: #7a1a1a"></i>

        </li>

    </footer>

    <!-- Bootstrap JS-->
