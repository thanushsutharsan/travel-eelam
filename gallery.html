<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <title>Gallery - Travel Eelam</title>
    <meta
      name="description"
      content="Explore Travel Eelam and experience the rich culture, food and historic landmarks that exisit today that define Tamil heritage and indentity."
    />
    <meta
      name="keywords"
      content="Travel Eelam, Tamil culture, Tamil heritage, Tamil identity, Sri Lanka, Tamil food, Tamil landmarks"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon/favicon-16x16.png"
    />
  </head>

  <body>
    <!-- Header -->
    <header>
      <!-- Bootstrap Navbar used for navbar-->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a
            class="navbar-brand"
            href="index.html"
            aria-label="Travel Eelam Home"
            ><img
              id="mainlogo"
              src="assets/images/travel-eelam-logo-jpg.jpg"
              alt="Picture of Tamil Eelam Karthiykai Flower"
          /></a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menuNavbar"
            aria-controls="menuNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="menuNavbar">
            <ul class="navbar-nav ms-auto" id="menu">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="gallery.html">Gallery</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="signup.html">Signup</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Main Content-->
    <main>
      <section id="gallery">
        <h2 class="gallery-of-eelam">Gallery of Eelam</h2>
        <div class="container">
          <div class="row g-3 photos">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/barathanatiyam.jpg"
                class="img-fluid rounded"
                alt="picture of barathanatiyam dancer posing with traditional clothes and jewellery"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/baby-ceremony.jpg"
                class="img-fluid rounded"
                alt="picture of a mother getting blessed when she is 8 months pregnant"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/auto-bunis.jpg"
                class="img-fluid rounded"
                alt="picture of a auto bunis, a traditional Tamil vehicle used for selling foods"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/pongal-tamil.jpg"
                class="img-fluid rounded"
                alt="picture of a traditional Tamil dish called pongal, which is made of rice and lentils"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/elineer-kaadi.jpg"
                class="img-fluid rounded"
                alt="picture of a traditional Tamil drinking coconut water called elineer"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/barathanatiyam.2.jpg"
                class="img-fluid rounded"
                alt="picture of barathanatiyam dancer black and white"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/thaali-img-jpg.jpg"
                class="img-fluid rounded"
                alt="picture of a traditional Tamil wedding thaali"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/mango.jpg"
                class="img-fluid rounded"
                alt="picture of a mango that is cut up and being hit by a ray of sunlight"
              />
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <img
                src="assets/images/milo-drink.jpg"
                class="img-fluid rounded"
                alt="picture of a milo drink in hand ready to be consumed"
              />
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer-->
    <footer class="bg-light text-center py-3">
      <p>&copy; 2026 Travel Eelam. All rights reserved.</p>
      <ul id="social-networks">
        <li>
          <a
            href="https://www.facebook.com/"
            target="_blank"
            rel="noopener"
            aria-label="Facebook (opens in a new tab)"
          >
            <i class="fa-brands fa-facebook-f" style="color: #7a1a1a"></i
          ></a>
        </li>

        <li>
          <a
            href="https://www.twitter.com/"
            target="_blank"
            rel="noopener"
            aria-label="Twitter (opens in a new tab)"
          >
            <i class="fa-brands fa-twitter" style="color: #7a1a1a"></i>
          </a>
        </li>

        <li>
          <a
            href="https://www.instagram.com/"
            target="_blank"
            rel="noopener"
            aria-label="Instagram (opens in a new tab)"
          >
            <i class="fa-brands fa-instagram" style="color: #7a1a1a"></i>
          </a>
        </li>

        <li>
          <a
            href="https://www.youtube.com/"
            target="_blank"
            rel="noopener"
            aria-label="YouTube (opens in a new tab)"
          >
            <i class="fa-brands fa-youtube" style="color: #7a1a1a"></i>
          </a>
        </li>
      </ul>
    </footer>

    <!-- Bootstrap JS-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome Kit-->

    <script
      src="https://kit.fontawesome.com/33a7e21e43.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
