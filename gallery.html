     <main>
      <section id="menu">
        <h2> Gallery of Eelam</h2>
        <div class="photos">
          <img src="assets/images/barathanatiyam.jpg" alt="picture of barathanatiyam dancer">
          <img src="assets/images/baby-ceremony.jpg" alt="picture of a mother getting blessed when she is 8 months pregnant">
          <img src="assets/images/auto-bunis.jpg" alt="picture of a auto bunis, a traditional Tamil vehicle used for selling foods">
          <img src="assets/images/pongal-tamil.jpg" alt="picture of a traditional Tamil dish called pongal, which is made of rice and lentils">
          <img src="assets/images/elineer-kaadi.jpg" alt="picture of a traditional Tamil drink called elineer, which is made of coconut water being cut by worker">
          <img src="assets/images/barathanatiyam.2.jpg" alt="picture of barathanatiyam dancer black and white">
          <img src="assets/images/thaali-img-jpg.jpg" alt="picture of a traditional Tamil wedding thaali, which is a necklace that the groom ties around the bride's neck during the wedding ceremony">
          <img src="assets/images/mango.jpg" alt="picture of a mango, which is a popular fruit in Tamil culture">
          <img src="assets/images/milo-drink.jpg" alt="picture of a milo drink, which is a popular chocolate malt drink in Tamil culture">
        </div>
        
      </section>
